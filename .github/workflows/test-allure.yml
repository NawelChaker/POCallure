name: Run Tests and Publish Allure Report

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Prepare Allure history
        run: |
          mkdir -p allure-results/history
          cp -r .allure-history/* allure-results/history/ || echo "No history yet"

      - name: Generate Allure report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Save history for next run
        run: |
          mkdir -p .allure-history
          cp -r allure-report/history/* .allure-history/ || echo "No history yet"

      - name: Copy report to docs for GitHub Pages
        run: |
          rm -rf docs
          cp -r allure-report docs

      - name: Commit and push docs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update Allure report"
          branch: main
          file_pattern: "docs/*"
