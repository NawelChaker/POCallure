name: Pipeline Allure Pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  pull-requests: write
  checks: write

env:
  ALLURE_RESULTS: allure-results
  ALLURE_REPORT: allure-report
  ALLURE_HISTORY: allure-history
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip

jobs:
  pytest:
    name: Run Tests
    runs-on: ubuntu-latest
    container:
      image: python:3.12
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up pip cache
        uses: actions/cache@v3
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Prepare Allure results folder
        run: |
          rm -rf ${{ env.ALLURE_RESULTS }}
          mkdir -p ${{ env.ALLURE_RESULTS }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest allure-pytest

      - name: Run pytest
        run: pytest tests --alluredir=${{ env.ALLURE_RESULTS }} || true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ${{ env.ALLURE_RESULTS }}
          retention-days: 7

  deploy:
    name: Deploy Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: pytest
    container:
      image: node:lts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Télécharger les résultats pytest
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: ${{ env.ALLURE_RESULTS }}

      # Télécharger la branche gh-pages pour récupérer l’historique
      - name: Checkout gh-pages (history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # Copier l’historique des runs précédents
      - name: Copy Allure history
        run: |
          mkdir -p ${{ env.ALLURE_HISTORY }}
          if [ -d gh-pages/history ]; then
            echo "Copying previous history..."
            cp -r gh-pages/history/* ${{ env.ALLURE_HISTORY }}/
          else
            echo "No previous history found (first run)."
          fi

      # Générer le rapport Allure avec historique
      - name: Generate Allure Report
        uses: GuitaristForEver/allure-v3-report-action@v1
        with:
          allure_results: ${{ env.ALLURE_RESULTS }}
          allure_history: ${{ env.ALLURE_HISTORY }}
          allure_report: ${{ env.ALLURE_REPORT }}
          keep_reports: 20
          report_name: Allure Report

      # Déployer le rapport complet sur GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ env.ALLURE_REPORT }}

      # Commenter la PR avec résumé Allure (optionnel)
      - name: Comment PR with Allure summary
        uses: allure-framework/allure-action@v0
        with:
          report-directory: ${{ env.ALLURE_REPORT }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
