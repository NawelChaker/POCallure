name: Generate Allure Test Report

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # Install dependencies via Poetry
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root

      # Run tests with Allure
      - name: Run tests with pytest and Allure
        run: |
          poetry run pytest --alluredir=allure-results
          continue-on-error: true
          
      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline@2.21.0

      # Generate Allure HTML report
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: List Allure report contents
        run: |
          echo "Allure report folder contents:"
          ls -R allure-report

      # Deploy HTML report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      # Print Allure HTML Report URL
      - name: Print Allure Report URL
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Allure HTML report is available at: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/"

      # Post summary to PR
      - name: Post Allure Summary to Pull Request
        uses: allure-framework/allure-action@v0
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}
