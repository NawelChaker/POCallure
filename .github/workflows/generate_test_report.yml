name: CI Pipeline with Allure Pages

on:
  push:
    branches:
      - main

env:
  ALLURE_RESULTS: allure-results
  ALLURE_REPORT: allure-report
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip

jobs:
  pytest:
    name: Run Tests
    runs-on: ubuntu-latest
    container:
      image: python:3.12
    steps:
      - uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest allure-pytest

      - name: Run pytest
        run: pytest --alluredir=${{ env.ALLURE_RESULTS }} || true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ${{ env.ALLURE_RESULTS }}
          retention-days: 7

  deploy:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: pytest
    container:
      image: node:lts
    steps:
      - uses: actions/checkout@v3

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: ${{ env.ALLURE_RESULTS }}

      - name: Install Allure CLI
        run: npm install -g allure

      - name: Generate Allure report
        run: |
          echo "Generating Allure report..."
          mkdir -p ${{ env.ALLURE_REPORT }}
          npx allure generate ${{ env.ALLURE_RESULTS }} --clean --output ${{ env.ALLURE_REPORT }}

      - name: Verify report files
        run: ls -la ${{ env.ALLURE_REPORT }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.ALLURE_REPORT }}

      - name: Print Allure report URL
        run: |
          echo "----------------------------------------"
          echo "Allure report URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.repository }}/"
          echo "----------------------------------------"
