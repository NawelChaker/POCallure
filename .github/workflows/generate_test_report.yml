name: Pipeline Allure Pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  pull-requests: write
  checks: write

env:
  ALLURE_RESULTS: allure-results
  ALLURE_REPORT: allure-report
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip

jobs:
  pytest:
    name: Run Tests
    runs-on: ubuntu-latest
    container:
      image: python:3.12
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up pip cache
        uses: actions/cache@v3
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest allure-pytest

      - name: Run pytest
        run: pytest --alluredir=${{ env.ALLURE_RESULTS }} || true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ${{ env.ALLURE_RESULTS }}
          retention-days: 7

  deploy:
    name: Deploy Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: pytest
    container:
      image: node:lts
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Télécharger les résultats du build de tests
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: ${{ env.ALLURE_RESULTS }}

      # Télécharger l’historique du build précédent s’il existe
      - name: Download previous Allure history
        uses: actions/download-artifact@v4
        with:
          name: allure-history
          path: ${{ env.ALLURE_REPORT }}/.allure
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure

      - name: Prepare Allure history folder
        run: |
          mkdir -p ${{ env.ALLURE_REPORT }}/.allure
          touch ${{ env.ALLURE_REPORT }}/.allure/history.jsonl || echo "[]" > ${{ env.ALLURE_REPORT }}/.allure/history.jsonl

      - name: Create Allure configuration
        run: |
          cat > allureConfig.json <<EOL
          {
            "historyPath": "${{ env.ALLURE_REPORT }}/.allure/history.jsonl",
            "appendHistory": true
          }
          EOL

      - name: Generate Allure report with history
        run: |
          echo "Generating Allure report with history..."
          mkdir -p ${{ env.ALLURE_REPORT }}
          npx allure generate ${{ env.ALLURE_RESULTS }} --clean --output ${{ env.ALLURE_REPORT }} --config allureConfig.json

      - name: Comment PR with Allure summary
        uses: allure-framework/allure-action@v0
        with:
          report-directory: ${{ env.ALLURE_REPORT }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Déplacer seulement si nécessaire (ex: sous-dossier "awesome")
      - name: Move Allure report to root if needed
        run: |
          if [ -d "${{ env.ALLURE_REPORT }}/awesome" ]; then
            mv ${{ env.ALLURE_REPORT }}/awesome/* ${{ env.ALLURE_REPORT }}/
          fi

      # Déployer le rapport sur GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.ALLURE_REPORT }}
          force: true

      # Upload du fichier history pour le prochain build
      - name: Upload Allure history
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: ${{ env.ALLURE_REPORT }}/.allure/history.jsonl
          retention-days: 30

      - name: Print Allure report URL
        run: |
          echo "----------------------------------------"
          echo "Allure report URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.repository }}/"
          echo "----------------------------------------"
